<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ระบบเช็คชื่อ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakrapetch:wght@300;500;700&display=swap');
        body { font-family: 'Chakrapetch', sans-serif; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-4 md:p-8">

    <header class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl md:text-3xl font-black text-cyan-400 tracking-wider">ATTENDANCE DASHBOARD</h1>
            <p class="text-xs text-gray-500 font-mono mt-1">LIVE MONITOR // BY J.A.R.V.I.S.</p>
        </div>
        <div class="flex items-center gap-3">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-emerald-400 pulse"></span>
            <span id="last-refresh-text" class="text-xs text-gray-500 font-mono">กำลังเชื่อมต่อ...</span>
        </div>
    </header>

    <!-- Filter bar -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 mb-6 flex flex-wrap gap-3 items-end">
        <div>
            <label class="block text-xs text-gray-500 font-mono uppercase mb-1">วิชา</label>
            <select id="filter-subject" onchange="applyFilter()"
                class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-500 min-w-[200px]">
                <option value="">— ทั้งหมด —</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 font-mono uppercase mb-1">วันที่</label>
            <input type="date" id="filter-date" onchange="applyFilter()"
                class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-500">
        </div>
        <button onclick="fetchData()"
            class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 text-sm px-4 py-2 rounded-lg transition">
            🔄 รีเฟรช
        </button>
        <button onclick="exportExcel()"
            class="bg-gray-800 hover:bg-gray-700 border border-cyan-500/30 text-cyan-400 text-sm px-4 py-2 rounded-lg transition ml-auto">
            📥 Export Excel
        </button>
    </div>

    <!-- Metric cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
            <p class="text-xs text-gray-500 uppercase font-mono mb-1">เช็คชื่อแล้ว</p>
            <p class="text-4xl font-black text-cyan-400" id="metric-total">—</p>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
            <p class="text-xs text-gray-500 uppercase font-mono mb-1">ผ่าน GPS</p>
            <p class="text-4xl font-black text-emerald-400" id="metric-pass">—</p>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
            <p class="text-xs text-gray-500 uppercase font-mono mb-1">ระยะเฉลี่ย</p>
            <p class="text-4xl font-black text-white" id="metric-avg">—</p>
            <p class="text-xs text-gray-600 font-mono">เมตร</p>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
            <p class="text-xs text-gray-500 uppercase font-mono mb-1">คนล่าสุด</p>
            <p class="text-lg font-bold text-purple-400 truncate" id="metric-latest">—</p>
        </div>
    </div>

    <!-- Table -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-800 flex items-center justify-between">
            <h2 class="text-sm font-bold text-cyan-400 uppercase font-mono">รายชื่อผู้เข้าเรียน</h2>
            <span id="table-count" class="text-xs text-gray-500 font-mono"></span>
        </div>

        <div id="loading-state" class="text-center py-16 text-gray-600 font-mono text-sm">
            ⏳ กำลังโหลดข้อมูลจาก Google Sheets...
        </div>
        <div id="empty-state" class="hidden text-center py-16 text-gray-600 font-mono text-sm">
            📭 ยังไม่มีข้อมูลในวันที่/วิชาที่เลือก
        </div>

        <div class="overflow-x-auto" id="table-wrap" style="display:none">
            <table class="w-full text-sm">
                <thead class="bg-gray-950">
                    <tr>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs uppercase">#</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs uppercase">รหัส นศ.</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs uppercase">ชื่อ - นามสกุล</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs uppercase">วิชา</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs uppercase">ผู้สอน</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs uppercase">เวลา</th>
                        <th class="text-right px-4 py-3 text-gray-500 font-mono text-xs uppercase">ระยะ (ม.)</th>
                    </tr>
                </thead>
                <tbody id="main-tbody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVi-NZy6VTxr-tWw-oO4Kb9U0TeSa1XDMwsVqppGjGwPaidsZXGF_IXTTwMF87CTkn/exec";

        let allData = [];
        let pollTimer = null;

        // set default date = today
        document.getElementById('filter-date').valueAsDate = new Date();

        async function fetchData() {
            document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-yellow-400 pulse";
            try {
                const res  = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now());
                const json = await res.json();
                if (json.status !== "ok") throw new Error(json.message);

                allData = json.data || [];

                // populate subject filter
                const subjects = [...new Set(allData.map(r => r.subject).filter(Boolean))];
                const sel = document.getElementById('filter-subject');
                const cur = sel.value;
                sel.innerHTML = '<option value="">— ทั้งหมด —</option>' +
                    subjects.map(s => `<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');

                applyFilter();
                const now = new Date().toTimeString().substring(0,8);
                document.getElementById('last-refresh-text').innerText = "อัปเดต: " + now;
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-400 pulse";
            } catch(err) {
                document.getElementById('last-refresh-text').innerText = "เชื่อมต่อไม่ได้: " + err.message;
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-500";
            }
        }

        function applyFilter() {
            const subjectFilter = document.getElementById('filter-subject').value;
            const dateFilter    = document.getElementById('filter-date').value;

            let filtered = allData;
            if (subjectFilter) filtered = filtered.filter(r => r.subject === subjectFilter);
            if (dateFilter)    filtered = filtered.filter(r => r.date === dateFilter);

            renderTable(filtered);
            renderMetrics(filtered);
        }

        function renderMetrics(data) {
            document.getElementById('metric-total').innerText = data.length || "0";
            document.getElementById('metric-pass').innerText  = data.length || "0";
            const avg = data.length
                ? Math.round(data.reduce((s,r) => s + (parseInt(r.distance)||0), 0) / data.length)
                : "—";
            document.getElementById('metric-avg').innerText    = avg;
            document.getElementById('metric-latest').innerText = data.length ? data[data.length-1].studentName : "—";
        }

        function renderTable(data) {
            document.getElementById('loading-state').classList.add('hidden');

            if (data.length === 0) {
                document.getElementById('table-wrap').style.display = 'none';
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('table-count').innerText = "";
                return;
            }

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('table-wrap').style.display = 'block';
            document.getElementById('table-count').innerText = data.length + " รายการ";

            document.getElementById('main-tbody').innerHTML = data.map((r, i) => `
                <tr class="border-t border-gray-800 hover:bg-gray-800/40 transition">
                    <td class="px-4 py-3 text-gray-600">${i+1}</td>
                    <td class="px-4 py-3 font-mono text-gray-300">${r.studentId || "—"}</td>
                    <td class="px-4 py-3 font-bold text-white">${r.studentName || "—"}</td>
                    <td class="px-4 py-3 text-gray-400 text-xs">${r.subject || "—"}</td>
                    <td class="px-4 py-3 text-purple-400 text-xs">${r.teacher || "—"}</td>
                    <td class="px-4 py-3 text-gray-400 font-mono text-xs">${String(r.timestamp).split(" ")[1] || r.timestamp || "—"}</td>
                    <td class="px-4 py-3 text-right text-cyan-400 font-mono">${r.distance || "—"}</td>
                </tr>`).join('');
        }

        function exportExcel() {
            const subjectFilter = document.getElementById('filter-subject').value;
            const dateFilter    = document.getElementById('filter-date').value;
            let filtered = allData;
            if (subjectFilter) filtered = filtered.filter(r => r.subject === subjectFilter);
            if (dateFilter)    filtered = filtered.filter(r => r.date === dateFilter);
            if (!filtered.length) { alert("ไม่มีข้อมูลที่จะส่งออก"); return; }

            const rows = filtered.map((r,i) => ({
                ลำดับ: i+1,
                รหัสนักศึกษา: r.studentId,
                ชื่อนามสกุล:  r.studentName,
                วิชา:          r.subject,
                ผู้สอน:        r.teacher || "—",
                วันที่:         r.date,
                เวลา:          String(r.timestamp).split(" ")[1] || r.timestamp,
                ระยะเมตร:      r.distance
            }));
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "เช็คชื่อ");
            XLSX.writeFile(wb, "attendance_" + (dateFilter||"all") + ".xlsx");
        }

        // โหลดครั้งแรก และ poll ทุก 15 วิ
        fetchData();
        pollTimer = setInterval(fetchData, 15000);
    </script>
</body>
</html>
