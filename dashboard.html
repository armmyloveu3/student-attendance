<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ระบบเช็คชื่อ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakrapetch:wght@300;500;700&display=swap');
        body { font-family: 'Chakrapetch', sans-serif; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .skeleton { background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
                    background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-4 md:p-8">

    <header class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
            <h1 class="text-2xl md:text-3xl font-black text-cyan-400 tracking-wider">ATTENDANCE DASHBOARD</h1>
            <p class="text-xs text-gray-500 font-mono mt-1">LIVE MONITOR // BY J.A.R.V.I.S.</p>
        </div>
        <div class="flex items-center gap-3">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400 pulse"></span>
            <span id="last-refresh-text" class="text-xs text-gray-500 font-mono">กำลังเชื่อมต่อ...</span>
            <button onclick="fetchData()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 text-xs px-3 py-1.5 rounded-lg transition">🔄</button>
        </div>
    </header>

    <!-- Filter bar -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 mb-6 flex flex-wrap gap-3 items-end">
        <div>
            <label class="block text-xs text-gray-500 font-mono uppercase mb-1">วิชา</label>
            <select id="filter-subject" onchange="applyFilter()"
                class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-500 min-w-[180px]">
                <option value="">— ทั้งหมด —</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 font-mono uppercase mb-1">ผู้สอน</label>
            <select id="filter-teacher" onchange="applyFilter()"
                class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-500 min-w-[160px]">
                <option value="">— ทั้งหมด —</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 font-mono uppercase mb-1">วันที่</label>
            <select id="filter-date" onchange="applyFilter()"
                class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-500 min-w-[180px]">
                <option value="">— ทั้งหมด —</option>
            </select>
        </div>
        <button onclick="resetFilters()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-400 text-sm px-4 py-2 rounded-lg transition">
            ✖ ล้าง filter
        </button>
        <button onclick="exportExcel('filtered')" class="bg-gray-800 hover:bg-gray-700 border border-cyan-500/30 text-cyan-400 text-sm px-4 py-2 rounded-lg transition">
            📥 Export (ตาม filter)
        </button>
        <button onclick="exportExcel('session')" class="bg-gray-800 hover:bg-gray-700 border border-purple-500/30 text-purple-400 text-sm px-4 py-2 rounded-lg transition ml-auto">
            📋 Export แยกรายคาบ
        </button>
    </div>

    <!-- Metric cards: แค่ 2 ใบ -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
            <p class="text-xs text-gray-500 uppercase font-mono mb-2">เช็คชื่อแล้ว</p>
            <p class="text-5xl font-black text-cyan-400" id="metric-total">—</p>
            <p class="text-xs text-gray-600 font-mono mt-1">คน</p>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
            <p class="text-xs text-gray-500 uppercase font-mono mb-2">คนล่าสุด</p>
            <p class="text-xl font-bold text-purple-400 leading-tight" id="metric-latest">—</p>
            <p class="text-xs text-gray-600 font-mono mt-1" id="metric-latest-time">-</p>
        </div>
    </div>

    <!-- Chart -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-bold text-cyan-400 uppercase font-mono">สถิติการเช็คชื่อ</h2>
            <div class="flex gap-2">
                <button onclick="setChartMode('hourly')" id="btn-hourly"
                    class="text-xs px-3 py-1 rounded-lg border border-cyan-500/50 text-cyan-400 bg-cyan-500/10">รายชั่วโมง</button>
                <button onclick="setChartMode('daily')" id="btn-daily"
                    class="text-xs px-3 py-1 rounded-lg border border-gray-700 text-gray-500">รายวัน</button>
            </div>
        </div>
        <canvas id="attendChart" height="80"></canvas>
        <div id="chart-empty" class="hidden text-center py-8 text-gray-600 font-mono text-sm">ยังไม่มีข้อมูล</div>
    </div>

    <!-- Table -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-800 flex items-center justify-between">
            <h2 class="text-sm font-bold text-cyan-400 uppercase font-mono">รายชื่อผู้เข้าเรียน</h2>
            <span id="table-count" class="text-xs text-gray-500 font-mono"></span>
        </div>
        <div id="loading-state" class="p-6 space-y-3">
            <div class="skeleton h-8 w-full"></div>
            <div class="skeleton h-8 w-5/6"></div>
            <div class="skeleton h-8 w-4/6"></div>
            <div class="skeleton h-8 w-5/6"></div>
            <p class="text-center text-xs text-gray-600 font-mono pt-2">⏳ กำลังเชื่อมต่อ Google Sheets...</p>
        </div>
        <div id="empty-state" class="hidden text-center py-16 text-gray-600 font-mono text-sm">
            📭 ยังไม่มีข้อมูลตาม filter ที่เลือก
        </div>
        <div class="overflow-x-auto" id="table-wrap" style="display:none">
            <table class="w-full text-sm">
                <thead class="bg-gray-950">
                    <tr>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs">#</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs">รหัส นศ.</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs">ชื่อ - นามสกุล</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs">วิชา</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs">ผู้สอน</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs">วันที่</th>
                        <th class="text-left px-4 py-3 text-gray-500 font-mono text-xs">เวลา</th>
                        <th class="text-right px-4 py-3 text-gray-500 font-mono text-xs">ระยะ (ม.)</th>
                    </tr>
                </thead>
                <tbody id="main-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNHjhWhr6gnpDgLckTAebA9EPpGuSCh74g1NjmD0Xx07Nd-_qFPpfAoA9GYmZ0OnKL/exec";
        let allData = [];

        function normalizeDate(val) {
            if (!val) return "";
            const s = String(val).trim();
            // ISO with timezone "2026-07-05T17:00:00.000Z" → บวก +7 ชม. แล้วตัดเอาวันที่
            if (s.includes('T') && s.endsWith('Z')) {
                const d = new Date(s);
                const bkk = new Date(d.getTime() + 7 * 60 * 60 * 1000);
                return bkk.toISOString().substring(0, 10);
            }
            // "2026-07-06 09:06:53" หรือ "2026-07-06"
            if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0, 10);
            // D/M/YYYY
            const thMatch = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
            if (thMatch) {
                const [, d, m, y] = thMatch;
                return y + "-" + m.padStart(2,"0") + "-" + d.padStart(2,"0");
            }
            return s;
        }

        // แปลง timestamp จาก Apps Script ให้เป็นเวลา HH:MM น. เท่านั้น
        function extractTime(val) {
            if (!val) return "—";
            const s = String(val).trim();
            // ISO UTC "2569-07-06T02:06:53.000Z" → บวก +7
            if (s.includes('T') && s.endsWith('Z')) {
                try {
                    const d = new Date(s);
                    const bkk = new Date(d.getTime() + 7 * 60 * 60 * 1000);
                    const h = String(bkk.getUTCHours()).padStart(2, '0');
                    const m = String(bkk.getUTCMinutes()).padStart(2, '0');
                    return h + ':' + m + ' น.';
                } catch(e) {}
            }
            // "2026-07-06 09:06:53" → จับ HH:MM ตรงๆ
            const m = s.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
            if (!m) return "—";
            return m[1].padStart(2, '0') + ':' + m[2] + ' น.';
        }

        function formatDateTH(dateStr) {
            if (!dateStr) return "—";
            try {
                const [y, m, d] = dateStr.split("-").map(Number);
                const months = ["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.",
                                "ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
                const buddhistYear = (y + 543).toString().slice(-2);
                return d + " " + (months[m] || m) + " " + buddhistYear;
            } catch { return dateStr; }
        }

        async function fetchData() {
            const t0 = Date.now();
            document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-yellow-400 pulse";
            document.getElementById('last-refresh-text').innerText = "กำลังโหลด...";
            try {
                // ใช้ AbortController timeout 15 วินาที
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 15000);
                const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now(), {
                    signal: controller.signal
                });
                clearTimeout(timeout);
                const text = await res.text();
                let json;
                try { json = JSON.parse(text); }
                catch(e) { throw new Error("รูปแบบข้อมูลผิดปกติ: " + text.substring(0, 100)); }
                if (json.status !== "ok") throw new Error(json.message || "error");

                allData = (json.data || []).map(r => ({ ...r, date: normalizeDate(r.date) }));

                populateFilters();
                applyFilter();

                const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
                document.getElementById('last-refresh-text').innerText = "อัปเดต: " + new Date().toTimeString().substring(0,8) + " (" + elapsed + "s)";
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-400 pulse";
            } catch(err) {
                const msg = err.name === 'AbortError' ? 'timeout (>15s) — Apps Script ตอบช้าเกินไป' : err.message;
                document.getElementById('last-refresh-text').innerText = "❌ " + msg;
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-500";
                document.getElementById('loading-state').classList.remove('hidden');
                document.getElementById('loading-state').innerHTML =
                    '<p class="text-red-400 font-mono text-sm">❌ ' + msg + '</p>' +
                    '<p class="text-gray-600 text-xs mt-2">เปิด F12 → Console ดู error ละเอียดได้ครับ</p>' +
                    '<button onclick="fetchData()" class="mt-3 text-xs bg-gray-800 px-4 py-2 rounded-lg border border-gray-700 text-gray-300">🔄 ลองใหม่</button>';
                document.getElementById('table-wrap').style.display = 'none';
                document.getElementById('empty-state').classList.add('hidden');
            }
        }

        function populateFilters() {
            const curS = document.getElementById('filter-subject').value;
            const curT = document.getElementById('filter-teacher').value;
            const curD = document.getElementById('filter-date').value;

            const subjects = [...new Set(allData.map(r => r.subject).filter(Boolean))].sort();
            const teachers = [...new Set(allData.map(r => r.teacher).filter(Boolean))].sort();
            const dates    = [...new Set(allData.map(r => r.date).filter(Boolean))].sort().reverse();

            document.getElementById('filter-subject').innerHTML =
                '<option value="">— ทั้งหมด —</option>' +
                subjects.map(s => `<option value="${s}" ${s===curS?'selected':''}>${s}</option>`).join('');

            document.getElementById('filter-teacher').innerHTML =
                '<option value="">— ทั้งหมด —</option>' +
                teachers.map(t => `<option value="${t}" ${t===curT?'selected':''}>${t}</option>`).join('');

            document.getElementById('filter-date').innerHTML =
                '<option value="">— ทั้งหมด —</option>' +
                dates.map(d => `<option value="${d}" ${d===curD?'selected':''}>${formatDateTH(d)}</option>`).join('');

            // default วันนี้ ถ้ายังไม่เคยเลือก
            if (!curD) {
                const today = new Date().toISOString().split("T")[0];
                if (dates.includes(today)) document.getElementById('filter-date').value = today;
            }
        }

        function applyFilter() {
            const sf = document.getElementById('filter-subject').value;
            const tf = document.getElementById('filter-teacher').value;
            const df = document.getElementById('filter-date').value;
            let filtered = allData;
            if (sf) filtered = filtered.filter(r => r.subject === sf);
            if (tf) filtered = filtered.filter(r => r.teacher === tf);
            if (df) filtered = filtered.filter(r => r.date === df);
            renderMetrics(filtered);
            renderTable(filtered);
            renderChart(filtered);
        }

        function resetFilters() {
            document.getElementById('filter-subject').value = '';
            document.getElementById('filter-teacher').value = '';
            document.getElementById('filter-date').value = '';
            applyFilter();
        }

        function renderMetrics(data) {
            document.getElementById('metric-total').innerText = data.length || "0";
            if (data.length) {
                const last = data[data.length - 1];
                document.getElementById('metric-latest').innerText      = last.studentName || "—";
                document.getElementById('metric-latest-time').innerText = extractTime(last.timestamp);
            } else {
                document.getElementById('metric-latest').innerText      = "—";
                document.getElementById('metric-latest-time').innerText = "-";
            }
        }

        function renderTable(data) {
            document.getElementById('loading-state').classList.add('hidden');
            if (data.length === 0) {
                document.getElementById('table-wrap').style.display = 'none';
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('table-count').innerText = "";
                return;
            }
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('table-wrap').style.display = 'block';
            document.getElementById('table-count').innerText = data.length + " รายการ";
            document.getElementById('main-tbody').innerHTML = data.map((r, i) => `
                <tr class="border-t border-gray-800 hover:bg-gray-800/40 transition">
                    <td class="px-4 py-3 text-gray-600">${i+1}</td>
                    <td class="px-4 py-3 font-mono text-gray-300 text-xs">${r.studentId || "—"}</td>
                    <td class="px-4 py-3 font-bold text-white">${r.studentName || "—"}</td>
                    <td class="px-4 py-3 text-gray-400 text-xs">${r.subject || "—"}</td>
                    <td class="px-4 py-3 text-purple-400 text-xs">${r.teacher || "—"}</td>
                    <td class="px-4 py-3 text-gray-400 text-xs font-mono">${formatDateTH(r.date)}</td>
                    <td class="px-4 py-3 text-gray-400 text-xs font-mono">${extractTime(r.timestamp)}</td>
                    <td class="px-4 py-3 text-right text-cyan-400 font-mono">${r.distance || "—"}</td>
                </tr>`).join('');
        }

        // ---- Export ----
        function exportExcel(mode) {
            const sf = document.getElementById('filter-subject').value;
            const tf = document.getElementById('filter-teacher').value;
            const df = document.getElementById('filter-date').value;
            let filtered = allData;
            if (sf) filtered = filtered.filter(r => r.subject === sf);
            if (tf) filtered = filtered.filter(r => r.teacher === tf);
            if (df) filtered = filtered.filter(r => r.date === df);
            if (!filtered.length) { alert("ไม่มีข้อมูลที่จะส่งออก"); return; }

            const wb = XLSX.utils.book_new();

            if (mode === 'session') {
                // export แยกรายคาบ (subject + date + teacher = 1 sheet)
                const sessions = {};
                filtered.forEach(r => {
                    const key = (r.subject||'') + '_' + (r.date||'') + '_' + (r.teacher||'');
                    if (!sessions[key]) sessions[key] = [];
                    sessions[key].push(r);
                });
                Object.entries(sessions).forEach(([key, rows], si) => {
                    const first = rows[0];
                    const sheetName = ((first.subject||'วิชา') + ' ' + (first.date||'')).substring(0, 31);
                    const data = rows.map((r, i) => ({
                        ลำดับ: i+1, รหัสนักศึกษา: r.studentId, ชื่อนามสกุล: r.studentName,
                        วิชา: r.subject, ผู้สอน: r.teacher||'—', วันที่: r.date,
                        เวลา: extractTime(r.timestamp), ระยะเมตร: r.distance
                    }));
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), sheetName);
                });
                XLSX.writeFile(wb, 'attendance_by_session.xlsx');
            } else {
                // export รวมตาม filter
                const rows = filtered.map((r, i) => ({
                    ลำดับ: i+1, รหัสนักศึกษา: r.studentId, ชื่อนามสกุล: r.studentName,
                    วิชา: r.subject, ผู้สอน: r.teacher||'—', วันที่: r.date,
                    เวลา: extractTime(r.timestamp), ระยะเมตร: r.distance
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'เช็คชื่อ');
                XLSX.writeFile(wb, 'attendance_' + (df||'all') + '.xlsx');
            }
        }

        // ---- Chart ----
        let chartInstance = null;
        let chartMode = 'hourly';

        function setChartMode(mode) {
            chartMode = mode;
            document.getElementById('btn-hourly').className = mode === 'hourly'
                ? 'text-xs px-3 py-1 rounded-lg border border-cyan-500/50 text-cyan-400 bg-cyan-500/10'
                : 'text-xs px-3 py-1 rounded-lg border border-gray-700 text-gray-500';
            document.getElementById('btn-daily').className = mode === 'daily'
                ? 'text-xs px-3 py-1 rounded-lg border border-cyan-500/50 text-cyan-400 bg-cyan-500/10'
                : 'text-xs px-3 py-1 rounded-lg border border-gray-700 text-gray-500';

            const sf = document.getElementById('filter-subject').value;
            const tf = document.getElementById('filter-teacher').value;
            const df = document.getElementById('filter-date').value;
            let filtered = allData;
            if (sf) filtered = filtered.filter(r => r.subject === sf);
            if (tf) filtered = filtered.filter(r => r.teacher === tf);
            if (df) filtered = filtered.filter(r => r.date === df);
            renderChart(filtered);
        }

        function renderChart(data) {
            const canvas = document.getElementById('attendChart');
            const empty  = document.getElementById('chart-empty');

            if (!data.length) {
                canvas.style.display = 'none';
                empty.classList.remove('hidden');
                if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
                return;
            }
            canvas.style.display = 'block';
            empty.classList.add('hidden');

            let labels, counts;
            if (chartMode === 'hourly') {
                // นับตามชั่วโมง
                const buckets = {};
                data.forEach(r => {
                    const t = extractTime(r.timestamp);
                    const h = t.substring(0, 2) + ':00';
                    buckets[h] = (buckets[h] || 0) + 1;
                });
                const sorted = Object.keys(buckets).sort();
                labels = sorted.map(h => h + ' น.');
                counts = sorted.map(h => buckets[h]);
            } else {
                // นับตามวัน
                const buckets = {};
                data.forEach(r => {
                    const d = normalizeDate(r.date);
                    buckets[d] = (buckets[d] || 0) + 1;
                });
                const sorted = Object.keys(buckets).sort();
                labels = sorted.map(d => formatDateTH(d));
                counts = sorted.map(d => buckets[d]);
            }

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(canvas, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'จำนวนผู้เช็คชื่อ',
                        data: counts,
                        backgroundColor: 'rgba(6,182,212,0.5)',
                        borderColor: 'rgba(6,182,212,1)',
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => ctx.parsed.y + ' คน' } }
                    },
                    scales: {
                        x: { ticks: { color: '#9ca3af', font: { size: 11 } }, grid: { color: '#1f2937' } },
                        y: { ticks: { color: '#9ca3af', stepSize: 1 }, grid: { color: '#1f2937' }, beginAtZero: true }
                    }
                }
            });
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
