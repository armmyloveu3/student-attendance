<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นักศึกษา - เช็คชื่อเข้าเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakrapetch:wght@300;500;700&display=swap');
        body { font-family: 'Chakrapetch', sans-serif; }
        .dark body { background: #030712; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top-color: #06b6d4; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #student-dropdown::-webkit-scrollbar { width: 4px; }
        #student-dropdown::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col justify-between p-4">

    <!-- Header -->
    <div class="text-center mt-6">
        <div class="flex justify-end mb-2">
            <button onclick="toggleTheme()" class="text-xs text-gray-600 px-2 py-1 rounded-lg border border-gray-800 hover:border-gray-600 transition" id="theme-btn">☀️ Light</button>
        </div>
        <span class="bg-cyan-500/10 text-cyan-400 text-xs px-3 py-1 rounded-full border border-cyan-500/20 font-mono">STUDENT TERMINAL</span>
        <h1 class="text-2xl font-bold mt-3" id="std-subject-title">กำลังโหลด...</h1>
    </div>

    <!-- Info cards -->
    <div class="max-w-sm w-full mx-auto mt-4">
        <div class="grid grid-cols-3 gap-2 text-center">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-3">
                <p class="text-[10px] text-gray-500 uppercase font-mono mb-1">วันที่</p>
                <p class="text-sm font-bold text-white" id="info-date">-</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-3">
                <p class="text-[10px] text-gray-500 uppercase font-mono mb-1">เวลา</p>
                <p class="text-sm font-bold text-cyan-400" id="info-time">-</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-3">
                <p class="text-[10px] text-gray-500 uppercase font-mono mb-1">ผู้สอน</p>
                <p class="text-sm font-bold text-emerald-400 truncate" id="info-teacher">-</p>
            </div>
        </div>
    </div>

    <!-- Device banner -->
    <div id="device-banner" class="hidden max-w-sm w-full mx-auto mt-3 bg-yellow-500/10 border border-yellow-500/30 rounded-xl px-4 py-3 text-center">
        <p class="text-yellow-400 text-sm font-bold mb-1">📱 ระบบได้บันทึกอุปกรณ์นี้ไว้แล้ว</p>
        <p class="text-yellow-300/70 text-xs">อย่าลงชื่อแทนกันนะจ๊ะ 😊</p>
    </div>

    <!-- Form -->
    <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700 max-w-sm w-full mx-auto my-4">
        <div id="form-section" class="flex flex-col gap-4">

            <!-- ค้นหาชื่อ -->
            <div class="relative">
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">ค้นหาชื่อหรือรหัสนักศึกษา</label>
                <input type="text" id="std-name" placeholder="พิมพ์ชื่อหรือรหัสเพื่อค้นหา" autocomplete="off"
                    class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-md text-center focus:outline-none focus:border-cyan-500 transition"
                    oninput="searchStudent(this.value)"
                    onkeydown="handleKeyDown(event)"
                    onblur="hideDropdown()">
                <div id="student-dropdown"
                    class="hidden absolute z-50 w-full bg-gray-900 border border-gray-700 rounded-xl mt-1 max-h-48 overflow-y-auto shadow-2xl">
                </div>
                <p id="lookup-status" class="text-xs text-center mt-1 font-mono hidden"></p>
            </div>

            <!-- รหัสนักศึกษา (readonly) -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">รหัสนักศึกษา</label>
                <input type="text" id="std-id" placeholder="ขึ้นอัตโนมัติเมื่อเลือกชื่อ" readonly
                    class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-cyan-400 text-lg font-mono text-center cursor-default">
            </div>

            <!-- ปุ่ม Submit -->
            <button id="submit-btn" onclick="confirmAndSubmit()"
                class="w-full bg-cyan-500 hover:bg-cyan-600 disabled:opacity-50 disabled:cursor-not-allowed text-gray-950 font-bold py-4 px-6 rounded-xl text-lg uppercase tracking-wider transition-all shadow-lg mt-2">
                📍 แชร์ GPS และส่งชื่อเข้าเรียน
            </button>
            <p class="text-center text-[11px] text-yellow-500/70 font-mono">
                📱 ระบบบันทึกอุปกรณ์ทุกครั้งที่ส่งชื่อ
            </p>
        </div>

        <!-- สถานะ -->
        <div id="status-section" class="hidden text-center py-4">
            <div id="status-icon" class="text-5xl mb-2"></div>
            <h2 id="status-title" class="text-xl font-bold mb-2"></h2>
            <p id="status-desc" class="text-xs text-gray-400 whitespace-pre-line leading-relaxed"></p>
            <button id="retry-btn" onclick="resetForm()" class="hidden mt-4 text-xs bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg border border-gray-600 text-gray-300 transition">
                ↩ ลองใหม่
            </button>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[1000] p-4">
        <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <h3 class="text-lg font-bold text-cyan-400 mb-4 text-center">✅ ยืนยันข้อมูล</h3>
            <div class="bg-gray-950 rounded-xl p-4 mb-4 space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">ชื่อ</span>
                    <span class="text-white font-bold" id="confirm-name"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">รหัส</span>
                    <span class="text-cyan-400 font-mono" id="confirm-id"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">วิชา</span>
                    <span class="text-white text-right ml-4" id="confirm-subject"></span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeConfirm()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 py-3 rounded-xl font-bold transition">
                    ยกเลิก
                </button>
                <button onclick="proceedSubmit()" class="bg-cyan-500 hover:bg-cyan-600 text-gray-950 py-3 rounded-xl font-bold transition">
                    ยืนยัน
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center text-[10px] text-gray-600 font-mono mb-1">ระบบมาเข้าเรียนซะดี ๆ // BY NongArmNarak</div>
    <div class="text-center text-[11px] text-gray-500 mb-4">หากเกิดข้อผิดพลาด กรุณาแจ้งพี่อาร์มครับ</div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzosyFxVtQLJeRQeHKoQpdBr24QCHEmDEp0T42PaxGPrCur-1hrxup4OJiMLooIl2ti/exec";

        // ── Theme toggle ──
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.style.background = isDark ? '' : '#f9fafb';
            document.body.style.color = isDark ? '' : '#111827';
            document.getElementById('theme-btn').innerText = isDark ? '☀️ Light' : '🌙 Dark';
        }

        // ── Device info ──
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let os = /iPhone|iPad/.test(ua)?'iOS':/Android/.test(ua)?'Android':/Windows/.test(ua)?'Windows':/Mac/.test(ua)?'macOS':'Other';
            let br = /CriOS/.test(ua)?'Chrome/iOS':/Chrome/.test(ua)?'Chrome':/Safari/.test(ua)?'Safari':/Firefox/.test(ua)?'Firefox':'Other';
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = '14px Arial'; ctx.fillText('fp', 2, 2);
            const cp = canvas.toDataURL().slice(-20);
            const raw = [ua, screen.width+'x'+screen.height, screen.colorDepth,
                         new Date().getTimezoneOffset(), navigator.hardwareConcurrency||0,
                         navigator.language, cp].join('|');
            let hash = 0;
            for (let i = 0; i < raw.length; i++) { hash = ((hash<<5)-hash)+raw.charCodeAt(i); hash|=0; }
            return {
                userAgent:   os + ' / ' + br,
                screenSize:  screen.width + 'x' + screen.height,
                fingerprint: 'FP_' + Math.abs(hash).toString(36).toUpperCase()
            };
        }

        // ── Device Lock ──
        function getLockKey() {
            const t = new URLSearchParams(window.location.search).get('token') || 'unknown';
            return 'devlock_' + t;
        }
        function getDeviceLock() {
            try { return JSON.parse(localStorage.getItem(getLockKey())); } catch(e) { return null; }
        }
        function saveDeviceLock(studentId, studentName, checkedAt) {
            try {
                localStorage.setItem(getLockKey(), JSON.stringify({
                    studentId, studentName, checkedAt, at: new Date().toISOString()
                }));
            } catch(e) {}
        }

        // แสดง banner ถ้าเคยลงชื่อแล้ว
        window.addEventListener('DOMContentLoaded', function() {
            if (getDeviceLock()) {
                document.getElementById('device-banner').classList.remove('hidden');
            }
        });

        // ── URL params ──
        const urlParams      = new URLSearchParams(window.location.search);
        const currentSubject = urlParams.get('sub') || "ไม่พบข้อมูลรายวิชา";
        const teacherName    = urlParams.get('teacher') ? decodeURIComponent(urlParams.get('teacher')) : "ไม่ระบุ";
        const setupDate      = urlParams.get('date') || "-";
        const setupTime      = urlParams.get('time') || "-";
        const teacherLat     = parseFloat(urlParams.get('tlat'));
        const teacherLon     = parseFloat(urlParams.get('tlon'));
        const tokenFromUrl   = urlParams.get('token');
        const allowedRadius  = parseInt(urlParams.get('radius')) || 100;

        document.getElementById('std-subject-title').innerText = decodeURIComponent(currentSubject);
        document.getElementById('info-teacher').innerText = teacherName;
        document.getElementById('info-time').innerText    = setupTime;
        if (setupDate && setupDate !== "-") {
            const d = new Date(setupDate);
            document.getElementById('info-date').innerText = d.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
        }

        // ── Student DB ──
        let studentList = [];
        let dropdownIndex = -1;

        async function loadStudentDB() {
            const status = document.getElementById('lookup-status');
            try {
                const res  = await fetch(APPS_SCRIPT_URL + '?action=students');
                const json = await res.json();
                if (json.status === 'ok') {
                    studentList = Object.entries(json.students).map(([id, name]) => ({ id, name }));
                    status.innerText = '✓ โหลดรายชื่อ ' + studentList.length + ' คนสำเร็จ';
                    status.className = 'text-xs text-center mt-1 text-emerald-400 font-mono';
                    status.classList.remove('hidden');
                    setTimeout(() => status.classList.add('hidden'), 2000);
                }
            } catch(e) {
                status.innerText = '⚠️ โหลดรายชื่อไม่ได้ กรอกเองได้เลยครับ';
                status.className = 'text-xs text-center mt-1 text-yellow-500 font-mono';
                status.classList.remove('hidden');
            }
        }

        function searchStudent(query) {
            const dropdown = document.getElementById('student-dropdown');
            const q = query.trim().toLowerCase();
            dropdownIndex = -1;
            if (document.getElementById('std-id').value) {
                document.getElementById('std-id').value = '';
            }
            if (q.length < 1) { dropdown.classList.add('hidden'); return; }
            const matches = studentList.filter(s =>
                s.name.toLowerCase().includes(q) || s.id.includes(q)
            ).slice(0, 8);
            if (matches.length === 0) { dropdown.classList.add('hidden'); return; }
            dropdown.innerHTML = matches.map((s, i) => `
                <div class="dropdown-item px-4 py-3 hover:bg-cyan-500/10 cursor-pointer border-b border-gray-800 last:border-0 text-left transition"
                     data-index="${i}" data-id="${s.id}" data-name="${s.name.replace(/"/g, '&quot;')}"
                     onmousedown="selectStudent('${s.id}', '${s.name.replace(/'/g, "\\'")}')">
                    <div class="text-white text-sm">${s.name}</div>
                    <div class="text-gray-500 text-xs font-mono">${s.id}</div>
                </div>`).join('');
            dropdown.classList.remove('hidden');
        }

        function handleKeyDown(event) {
            const dropdown = document.getElementById('student-dropdown');
            const items = dropdown.querySelectorAll('.dropdown-item');
            if (items.length === 0) return;
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                dropdownIndex = Math.min(dropdownIndex + 1, items.length - 1);
                items.forEach((el, i) => el.classList.toggle('bg-cyan-500/10', i === dropdownIndex));
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                dropdownIndex = Math.max(dropdownIndex - 1, 0);
                items.forEach((el, i) => el.classList.toggle('bg-cyan-500/10', i === dropdownIndex));
            } else if (event.key === 'Enter') {
                event.preventDefault();
                if (dropdownIndex >= 0 && items[dropdownIndex]) {
                    const el = items[dropdownIndex];
                    selectStudent(el.dataset.id, el.dataset.name);
                } else if (items.length === 1) {
                    const el = items[0];
                    selectStudent(el.dataset.id, el.dataset.name);
                }
            } else if (event.key === 'Escape') {
                dropdown.classList.add('hidden');
            }
        }

        function selectStudent(id, name) {
            document.getElementById('std-name').value = name;
            document.getElementById('std-id').value   = id;
            document.getElementById('student-dropdown').classList.add('hidden');
            const status = document.getElementById('lookup-status');
            status.innerText = '✓ เลือกแล้ว: ' + id;
            status.className = 'text-xs text-center mt-1 text-emerald-400 font-mono';
            status.classList.remove('hidden');
        }

        function hideDropdown() {
            setTimeout(() => {
                document.getElementById('student-dropdown').classList.add('hidden');
            }, 150);
        }

        loadStudentDB();

        // ── Distance ──
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ── Confirm Modal ──
        function confirmAndSubmit() {
            if (!tokenFromUrl || isNaN(teacherLat) || isNaN(teacherLon)) {
                alert("ลิงก์ไม่ถูกต้องหรืออาจารย์ยังไม่ได้เปิดระบบครับ");
                return;
            }
            const id   = document.getElementById('std-id').value.trim();
            const name = document.getElementById('std-name').value.trim();
            if (!name) { alert("กรุณาพิมพ์ชื่อหรือเลือกจากรายชื่อด้วยครับ"); return; }
            if (!id)   { alert("กรุณาเลือกชื่อจากรายการด้วยครับ เพื่อให้ระบบดึงรหัสนักศึกษาให้อัตโนมัติ"); return; }

            // เช็คว่าเคยลงชื่อไปแล้วไหม
            const lock = getDeviceLock();
            if (lock) {
                const checkedAt = lock.checkedAt || lock.at || '-';
                showStatus("duplicate",
                    "⚠️ เครื่องนี้ลงชื่อไปแล้ว",
                    `ชื่อ: ${lock.studentName}\nรหัส: ${lock.studentId}\nวิชา: ${decodeURIComponent(currentSubject)}\nผู้สอน: ${teacherName}\nเมื่อเวลา: ${checkedAt}`
                );
                return;
            }

            // แสดง confirm modal
            document.getElementById('confirm-name').innerText    = name;
            document.getElementById('confirm-id').innerText      = id;
            document.getElementById('confirm-subject').innerText = decodeURIComponent(currentSubject);
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function closeConfirm() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        function proceedSubmit() {
            closeConfirm();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังตรวจสอบพิกัด...';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const dist = Math.round(calculateDistance(teacherLat, teacherLon, position.coords.latitude, position.coords.longitude));
                    btn.innerHTML = '<span class="spinner"></span> กำลังตรวจสอบระยะ...';
                    if (dist <= allowedRadius) {
                        sendToSheet(dist);
                    } else {
                        btn.disabled = false;
                        btn.innerHTML = '📍 แชร์ GPS และส่งชื่อเข้าเรียน';
                        const rt = allowedRadius >= 1000 ? (allowedRadius/1000).toFixed(2)+' กม.' : allowedRadius+' เมตร';
                        // Haptic feedback
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                        showStatus("failed", "❌ พิกัดอยู่นอกพื้นที่ห้องเรียน",
                            `คุณอยู่ห่างจากห้องเรียน ${dist} เมตร\nรัศมีที่กำหนด: ${rt}`);
                    }
                }, function(err) {
                    btn.disabled = false;
                    btn.innerHTML = '📍 แชร์ GPS และส่งชื่อเข้าเรียน';
                    alert("คุณต้องกดยอมรับสิทธิ์ GPS บนมือถือเพื่อใช้ยืนยันพิกัดครับ");
                }, { enableHighAccuracy: true, timeout: 15000 });
            }
        }

        async function sendToSheet(distance) {
            const btn  = document.getElementById('submit-btn');
            const id   = document.getElementById('std-id').value.trim();
            const name = document.getElementById('std-name').value.trim();
            btn.innerHTML = '<span class="spinner"></span> กำลังบันทึกข้อมูล...';

            const device  = getDeviceInfo();
            const now     = new Date();
            const timeStr = now.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' }) + ' น.';

            const payload = JSON.stringify({
                studentId:   id,
                studentName: name,
                subject:     decodeURIComponent(currentSubject),
                teacher:     teacherName,
                date:        setupDate,
                distance,
                userAgent:   device.userAgent,
                screenSize:  device.screenSize,
                fingerprint: device.fingerprint
            });

            const url = APPS_SCRIPT_URL +
                '?ua=' + encodeURIComponent(device.userAgent) +
                '&sc=' + encodeURIComponent(device.screenSize) +
                '&fp=' + encodeURIComponent(device.fingerprint);

            try {
                await fetch(url, {
                    method:  "POST",
                    mode:    "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body:    payload
                });
                // Haptic feedback สำเร็จ
                if (navigator.vibrate) navigator.vibrate(200);
                saveDeviceLock(id, name, timeStr);
                document.getElementById('device-banner').classList.remove('hidden');
                showStatus("success", "✅ บันทึกข้อมูลสำเร็จ!",
                    `ชื่อ: ${name}\nรหัส: ${id}\nวิชา: ${decodeURIComponent(currentSubject)}\nผู้สอน: ${teacherName}\nห่างจากอาจารย์: ${distance} เมตร\nเวลา: ${timeStr}`
                );
            } catch(err) {
                btn.disabled = false;
                btn.innerHTML = '📍 แชร์ GPS และส่งชื่อเข้าเรียน';
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                showStatus("failed", "❌ เกิดข้อผิดพลาด",
                    "ไม่สามารถส่งข้อมูลได้ กรุณาแจ้งพี่อาร์มครับ\n(" + err.message + ")");
            }
        }

        function showStatus(type, title, desc) {
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('status-section').classList.remove('hidden');
            const icons  = { success:"✅", duplicate:"⚠️", failed:"❌" };
            const colors = { success:"text-emerald-400", duplicate:"text-yellow-400", failed:"text-red-500" };
            document.getElementById('status-icon').innerText  = icons[type]  || "❌";
            document.getElementById('status-title').className = "text-xl font-bold mb-2 " + (colors[type] || "text-red-500");
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-desc').innerText  = desc;
            const retryBtn = document.getElementById('retry-btn');
            if (type === 'failed') retryBtn.classList.remove('hidden');
            else retryBtn.classList.add('hidden');
        }

        function resetForm() {
            document.getElementById('form-section').classList.remove('hidden');
            document.getElementById('status-section').classList.add('hidden');
            document.getElementById('retry-btn').classList.add('hidden');
            const btn = document.getElementById('submit-btn');
            btn.disabled = false;
            btn.innerHTML = '📍 แชร์ GPS และส่งชื่อเข้าเรียน';
        }
    </script>
</body>
</html>
