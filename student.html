<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นักศึกษา - เช็คชื่อเข้าเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Chakrapetch:wght@300;500;700&display=swap'); body { font-family: 'Chakrapetch', sans-serif; }</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col justify-between p-4">

    <div class="text-center mt-6">
        <span class="bg-cyan-500/10 text-cyan-400 text-xs px-3 py-1 rounded-full border border-cyan-500/20 font-mono">STUDENT TERMINAL</span>
        <h1 class="text-2xl font-bold mt-2" id="std-subject-title">กำลังดึงข้อมูลวิชาจาก QR Code...</h1>
    </div>

    <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700 max-w-sm w-full mx-auto my-auto">
        <div id="form-section" class="flex flex-col gap-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">รหัสนักศึกษา</label>
                <input type="text" id="std-id" placeholder="650961XXXX" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-lg font-mono text-center focus:outline-none focus:border-cyan-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">ชื่อ - นามสกุล</label>
                <input type="text" id="std-name" placeholder="นายสมชาย ใจดี" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-md text-center focus:outline-none focus:border-cyan-500">
            </div>
            <button onclick="submitAttendance()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold py-4 px-6 rounded-xl text-lg uppercase tracking-wider transition-all shadow-lg mt-2">
                📍 แชร์ GPS และส่งชื่อเข้าเรียน
            </button>
        </div>

        <div id="status-section" class="hidden text-center py-4">
            <div id="status-icon" class="text-5xl mb-2"></div>
            <h2 id="status-title" class="text-xl font-bold mb-1"></h2>
            <p id="status-desc" class="text-xs text-gray-400"></p>
        </div>
    </div>

    <div class="text-center text-[10px] text-gray-600 font-mono mb-4">ANTI-CHEAT GPS SECURITY // BY J.A.R.V.I.S.</div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVi-NZy6VTxr-tWw-oO4Kb9U0TeSa1XDMwsVqppGjGwPaidsZXGF_IXTTwMF87CTkn/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const currentSubject = urlParams.get('sub') || "ไม่พบข้อมูลรายวิชา (ลิงก์ไม่สมบูรณ์)";
        const setupDate = urlParams.get('date');
        const setupTime = urlParams.get('time');
        const teacherLat = parseFloat(urlParams.get('tlat'));
        const teacherLon = parseFloat(urlParams.get('tlon'));
        const tokenFromUrl = urlParams.get('token');
        const allowedRadius = parseInt(urlParams.get('radius')) || 100;

        document.getElementById('std-subject-title').innerText = decodeURIComponent(currentSubject);

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function submitAttendance() {
            if (!tokenFromUrl || isNaN(teacherLat) || isNaN(teacherLon)) {
                alert("ลิงก์ไม่ถูกต้องหรืออาจารย์ยังไม่ได้เปิดระบบแชร์พิกัดห้องเรียนครับ");
                return;
            }

            const id = document.getElementById('std-id').value.trim();
            const name = document.getElementById('std-name').value.trim();
            if (!id || !name) { alert("กรุณากรอกข้อมูลให้ครบถ้วนด้วยครับ"); return; }

            // ล็อกปุ่มกันกด 2 ครั้ง
            const btn = document.querySelector('button[onclick="submitAttendance()"]');
            btn.disabled = true;
            btn.innerText = "⏳ กำลังตรวจสอบพิกัด...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const distance = calculateDistance(teacherLat, teacherLon, position.coords.latitude, position.coords.longitude);
                    const roundedDistance = Math.round(distance);

                    if (roundedDistance <= allowedRadius) {
                        sendToSheet(id, name, roundedDistance);
                    } else {
                        btn.disabled = false;
                        btn.innerText = "📍 แชร์ GPS และส่งชื่อเข้าเรียน";
                        const radiusText = allowedRadius >= 1000
                            ? (allowedRadius / 1000).toFixed(2) + ' กม.'
                            : allowedRadius + ' เมตร';
                        showStatus("failed", "❌ พิกัดอยู่นอกพื้นที่ห้องเรียน", `พิกัดของคุณอยู่ห่างจากห้องเรียน ${roundedDistance} เมตร (รัศมีที่กำหนด: ${radiusText})`);
                    }
                }, function() {
                    btn.disabled = false;
                    btn.innerText = "📍 แชร์ GPS และส่งชื่อเข้าเรียน";
                    alert("คุณต้องกดยอมรับสิทธิ์ GPS บนมือถือเพื่อใช้ยืนยันพิกัดครับ");
                }, { enableHighAccuracy: true, timeout: 10000 });
            }
        }

        async function sendToSheet(studentId, studentName, distance) {
            const btn = document.querySelector('button[onclick="submitAttendance()"]');
            btn.innerText = "📡 กำลังบันทึกข้อมูล...";

            const payload = {
                studentId:   studentId,
                studentName: studentName,
                subject:     decodeURIComponent(currentSubject),
                date:        setupDate,
                distance:    distance
            };

            try {
                // Apps Script ต้องใช้ no-cors → ส่งแบบ text/plain แล้ว parse JSON ฝั่ง GAS
                await fetch(APPS_SCRIPT_URL, {
                    method:  "POST",
                    mode:    "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body:    JSON.stringify(payload)
                });
                // no-cors ไม่รู้ response จริง → ถ้าไม่ throw ถือว่าสำเร็จ
                showStatus("success", "✅ บันทึกข้อมูลสำเร็จ!", `ระบบบันทึกชื่อเข้า Google Sheets แล้ว (ห่างจากอาจารย์ ${distance} เมตร)`);
            } catch (err) {
                showStatus("failed", "❌ เกิดข้อผิดพลาด", "ไม่สามารถส่งข้อมูลได้ กรุณาแจ้งอาจารย์ครับ (" + err.message + ")");
            }
        }

        function showStatus(type, title, desc) {
            document.getElementById('form-section').classList.add('hidden');
            const section = document.getElementById('status-section');
            section.classList.remove('hidden');
            if (type === "success") {
                document.getElementById('status-icon').innerText = "✅";
                document.getElementById('status-title').className = "text-xl font-bold text-emerald-400 mb-1";
            } else {
                document.getElementById('status-icon').innerText = "❌";
                document.getElementById('status-title').className = "text-xl font-bold text-red-500 mb-1";
            }
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-desc').innerText = desc;
        }
    </script>
</body>
</html>
